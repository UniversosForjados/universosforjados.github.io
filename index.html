<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela Mundialista Premium - Los 7 Amigos</title>
    <style>
        :root {
            --verde-grama: #1b4d22;
            --verde-oscuro: #0f3015;
            --dorado: #ffd700;
            --blanco: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.25);
            --morado-bracket: rgba(38, 16, 71, 0.85);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            height: 100vh;
            width: 100vw;
            background-color: #122613;
            display: grid;
            grid-template-columns: 320px 1fr;
            overflow: hidden;
            position: relative;
            user-select: none;
        }

        /* --- EFECTO CLICK SPARK (CANVAS) --- */
        #spark-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        /* --- COLUMNA LATERAL (PERFIL LINKEDIN) --- */
        .sidebar-perfil {
            background: rgba(255, 255, 255, 0.98);
            border-right: 3px solid var(--dorado);
            display: flex;
            flex-direction: column;
            padding: 20px 15px;
            box-shadow: 5px 0 15px rgba(0,0,0,0.3);
            z-index: 10;
            height: 100vh;
            overflow-y: auto;
        }

        .avatar-contenedor {
            position: relative;
            width: 100px; height: 100px;
            margin: 0 auto 10px;
            border-radius: 50%;
            border: 4px solid var(--verde-grama);
            overflow: hidden;
        }

        .avatar-img { width: 100%; height: 100%; object-fit: cover; }
        .btn-subir-foto {
            background: rgba(0,0,0,0.6); color: white;
            position: absolute; bottom: 0; width: 100%;
            font-size: 10px; padding: 3px 0; text-align: center; cursor: pointer;
        }

        .nombre-perfil { font-size: 20px; color: var(--verde-oscuro); font-weight: bold; text-align: center; margin-bottom: 8px; }

        .seccion-favorito {
            background: #f8f9fa; padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #ddd;
        }
        .seccion-favorito label { font-size: 11px; font-weight: bold; color: var(--verde-grama); display: block; margin-bottom: 4px; }
        .selector-fav { width: 100%; padding: 5px; border-radius: 4px; font-size: 12px; margin-bottom: 5px; }
        
        .contenedor-curiosidades { max-height: 140px; overflow-y: auto; margin-top: 5px; }
        .dato-item { font-size: 11px; color: #444; background: #fff; padding: 5px; border-radius: 4px; border-left: 3px solid var(--dorado); margin-bottom: 4px; font-style: italic;}

        /* --- SECCIÓN MASCOTAS COMENTARISTAS --- */
        .contenedor-mascota {
            margin-top: auto;
            background: #e8f5e9;
            border-radius: 10px;
            padding: 10px;
            border: 2px solid var(--verde-grama);
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
        }
        .img-mascota { width: 60px; height: 60px; object-fit: contain; }
        .burbuja-comentario {
            background: white; padding: 8px; border-radius: 8px;
            font-size: 11px; color: #333; font-weight: 500;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 100%;
            border: 1px solid #ccc;
        }

        /* --- LIENZO CENTRAL: CANCHA DE FÚTBOL --- */
        .cancha-escenario {
            position: relative;
            height: 100vh;
            background-color: #16421c;
            background-image: 
                linear-gradient(rgba(255,255,255,0.05) 2px, transparent 2px),
                linear-gradient(90deg, rgba(255,255,255,0.05) 2px, transparent 2px),
                repeating-linear-gradient(0deg, #143d1a, #143d1a 45px, #18491f 45px, #18491f 90px);
            background-size: 45px 45px, 45px 45px, auto;
            padding: 20px;
        }

        /* Marcaciones tácticas de la cancha */
        .cancha-escenario::before {
            content: ""; position: absolute; top: 10%; bottom: 10%; left: 5%; right: 5%;
            border: 2px solid rgba(255,255,255,0.1); pointer-events: none;
        }

        /* --- ALINEACIÓN SUPERIOR DE JUGADORES --- */
        .alineacion-amigos {
            display: flex; justify-content: center; gap: 20px;
            position: absolute; top: 25px; left: 0; right: 0; z-index: 5;
        }
        .amigo-burbuja {
            background: rgba(255,255,255,0.9); padding: 5px 10px; border-radius: 20px;
            display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            cursor: pointer; transition: transform 0.2s;
        }
        .amigo-burbuja:hover { transform: scale(1.1); }
        .amigo-pic { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; border: 1px solid var(--verde-grama); }
        .amigo-txt { font-size: 12px; font-weight: bold; }

        /* --- CUADROS FLOTANTES Y ARRASTRABLES (DRAGGABLE GLASS) --- */
        .cuadro-flotante {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid var(--glass-border);
            border-radius: 14px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            z-index: 8;
            overflow: hidden;
        }

        .barra-arrastre {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 12px;
            cursor: move;
            font-size: 12px;
            font-weight: bold;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
        }

        .contenido-cuadro { padding: 12px; max-height: 320px; overflow-y: auto; }

        /* --- POSICIONAMIENTO INICIAL DE LOS CUADROS --- */
        #cuadro-bracket { top: 120px; left: 40px; width: 440px; background: var(--morado-bracket); }
        #cuadro-tabla { top: 120px; right: 40px; width: 460px; background: rgba(15, 48, 21, 0.85); }

        /* Estilos Internos del Bracket */
        .flex-bracket { display: flex; justify-content: space-between; align-items: center; height: 160px; }
        .col-bracket { display: flex; flex-direction: column; justify-content: space-around; height: 100%; }
        .box-partido { background: #3b1e6d; color: white; padding: 4px 8px; border-radius: 4px; font-size: 10px; text-align: center; border: 1px solid rgba(255,255,255,0.2); min-width: 80px;}

        /* Estilos Internos de la Tabla */
        .tabla-mini { width: 100%; border-collapse: collapse; font-size: 11px; color: white; }
        .tabla-mini th { background: rgba(255,255,255,0.2); padding: 6px; text-align: center; }
        .tabla-mini td { padding: 6px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <canvas id="spark-canvas"></canvas>

    <div class="pantalla-login" id="seccion-login" style="position: absolute; top: 35%; left: 40%; z-index: 100;">
        <h1 style="color: var(--verde-grama); font-size: 22px; margin-bottom: 10px;">🏆 Estadio Quiniela v2 🏆</h1>
        <select id="login-usuario" class="campo-login">
            <option value="">Selecciona Usuario...</option>
            <option value="Saul">Saul</option>
            <option value="Jorge">Jorge</option>
            <option value="Osmel">Osmel</option>
            <option value="Edgar">Edgar</option>
            <option value="Guillermo">Guillermo</option>
            <option value="Francisco">Francisco</option>
            <option value="Gerardo">Gerardo</option>
        </select>
        <input type="password" id="login-clave" class="campo-login" placeholder="Contraseña">
        <button onclick="intentarLogin()" style="width: 100%;">Ingresar</button>
    </div>

    <div id="seccion-dashboard" class="dashboard-container" style="display: none; width: 100%; height: 100%;">
        
        <aside class="sidebar-perfil">
            <div class="avatar-contenedor">
                <img id="mi-avatar" class="avatar-img" src="https://cdn-icons-png.flaticon.com/512/53/53283.png">
                <label class="btn-subir-foto">Cambiar<input type="file" id="input-foto" accept="image/*" style="display:none;" onchange="procesarFoto(event)"></label>
            </div>
            <div class="nombre-perfil" id="mi-nombre">Usuario</div>
            
            <div class="seccion-favorito">
                <label>⭐ Equipo Favorito:</label>
                <select id="select-favorito" class="selector-fav" onchange="actualizarEquipoFavorito(this.value)"></select>
                <div style="text-align:center;"><img id="flag-fav" style="width:40px; height:25px; display:none; margin: 5px auto; border:1px solid #ccc;"></div>
                <div class="contenedor-curiosidades" id="curiosidades-box"></div>
            </div>

            <button onclick="alert('Formulario de edición disponible en la siguiente fase de despliegue.')" style="width: 100%; margin-bottom: 8px;">📝 Editar Quiniela</button>
            <button onclick="cerrarSesion()" style="background:#cc2424; width:100%; margin-top:auto;">🚪 Salir</button>

            <div class="contenedor-mascota">
                <img id="mascota-img" class="img-mascota" src="https://cdn-icons-png.flaticon.com/512/9463/9463943.png">
                <div class="burbuja-comentario" id="comentario-texto">¡Cargando transmisiones del Estadio de Amigos!</div>
            </div>
        </aside>

        <main class="cancha-escenario">
            <div class="alineacion-amigos" id="cancha-amigos"></div>

            <div class="cuadro-flotante" id="cuadro-bracket">
                <div class="barra-arrastre" onmousedown="iniciarArrastre(event, 'cuadro-bracket')">
                    <span>🌿 Árbol de Eliminatorias (FIFA)</span>
                    <span style="font-size: 10px; opacity: 0.6;">📌 Arrástrame</span>
                </div>
                <div class="contenido-cuadro flex-bracket">
                    <div class="col-bracket"><div class="box-partido">CHI vs MEX</div><div class="box-partido">ARG vs NGA</div></div>
                    <div class="col-bracket"><div class="box-partido">Por definir</div></div>
                    <div class="col-bracket centro-final"><span style="color:var(--dorado); font-size:10px;">FINAL</span>👑 🏆</div>
                    <div class="col-bracket"><div class="box-partido">Por definir</div></div>
                    <div class="col-bracket"><div class="box-partido">USA vs ITA</div><div class="box-partido">MAR vs KOR</div></div>
                </div>
            </div>

            <div class="cuadro-flotante" id="cuadro-tabla">
                <div class="barra-arrastre" onmousedown="iniciarArrastre(event, 'cuadro-tabla')">
                    <span>📊 Puntuaciones de los Amigos</span>
                    <span style="font-size: 10px; opacity: 0.6;">📌 Arrástrame</span>
                </div>
                <div class="contenido-cuadro">
                    <table class="tabla-mini">
                        <thead>
                            <tr><th>Pos</th><th>Amigo</th><th>Perfectos</th><th>Parciales</th><th>Total</th></tr>
                        </thead>
                        <tbody id="cuerpo-tabla"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        const credenciales = { "Saul": "4rgentina", "Jorge": "3spaña", "Osmel": "8rasil", "Edgar": "Fr4ncia", "Guillermo": "4lemani4", "Francisco": "P0rtug4l", "Gerardo": "1talia" };
        const banderasPaises = { "Argentina": "ar", "Francia": "fr", "España": "es", "Alemania": "de", "Brasil": "br", "Portugal": "pt", "Italia": "it", "Marruecos": "ma", "México": "mx", "Estados Unidos": "us" };

        // 10 Datos Curiosos por equipo para la rotación aleatoria de 3
        const poolCuriosidades = {
            "España": [
                "No incluyó jugadores del Real Madrid en la Euro 2021.", "Ganó su mundial en 2010 con solo 8 goles anotados.", "Récord de 126 pases en un solo tiempo extra.", "Primer país en ganar el triplete Euro-Mundial-Euro.",
                "Su peor derrota histórica fue un 7-1 ante Italia.", "Hizo debutar a Gavi con solo 17 años.", "Posee la mayor posesión registrada en mundiales (84%).", "Su mascota mítica de 1982 fue Naranjito.",
                "Es conocida mundialmente como 'La Furia Roja'.", "Su jugador con más partidos es Sergio Ramos."
            ],
            "Argentina": [
                "Usó balones locales en la primera final de 1930.", "Es el equipo con más victorias en penales en mundiales.", "Maradona recibió 53 faltas en México 86.", "Ganó la Copa del Mundo en Qatar 2022.",
                "Su primer partido oficial fue en 1901 contra Uruguay.", "Es la selección con más tarjetas amarillas de la historia.", "Messi es su máximo goleador histórico.", "Ganó dos medallas de oro olímpicas consecutivas.",
                "Su camiseta clásica tiene 3 franjas celestes.", "Su peor racha fue quedar fuera en fase de grupos en 2002."
            ]
        };

        const mascotas = [
            { nombre: "Ato", img: "https://cdn-icons-png.flaticon.com/512/9463/9463943.png" },
            { nombre: "Kaz", img: "https://cdn-icons-png.flaticon.com/512/10478/10478749.png" },
            { nombre: "Nik", img: "https://cdn-icons-png.flaticon.com/512/4134/4134173.png" }
        ];

        let usuarioLogueado = "";

        // --- LÓGICA DE DRAG AND DROP (ARRASTRE) ---
        let cuadroActivo = null;
        let offsetX = 0, offsetY = 0;

        function iniciarArrastre(e, idCuadro) {
            cuadroActivo = document.getElementById(idCuadro);
            offsetX = e.clientX - cuadroActivo.offsetLeft;
            offsetY = e.clientY - cuadroActivo.offsetTop;
            document.addEventListener('mousemove', moverCuadro);
            document.addEventListener('mouseup', detenerArrastre);
        }

        function moverCuadro(e) {
            if (cuadroActivo) {
                cuadroActivo.style.left = (e.clientX - offsetX) + 'px';
                cuadroActivo.style.top = (e.clientY - offsetY) + 'px';
            }
        }

        function detenerArrastre() {
            cuadroActivo = null;
            document.removeEventListener('mousemove', moverCuadro);
            document.removeEventListener('mouseup', detenerArrastre);
        }

        // --- EFECTO CLICK SPARK PREMIUM (REACTBITS STYLE) ---
        const canvas = document.getElementById('spark-canvas');
        const ctx = canvas.getContext('2d');
        let sparks = [];

        function ajustarCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', ajustarCanvas);
        ajustarCanvas();

        window.addEventListener('click', (e) => {
            crearChispas(e.clientX, e.clientY);
        });

        function crearChispas(x, y) {
            const count = 8; // sparkCount
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 / count) * i;
                sparks.push({
                    x: x, y: y,
                    vx: Math.cos(angle) * (Math.random() * 3 + 2),
                    vy: Math.sin(angle) * (Math.random() * 3 + 2),
                    alpha: 1,
                    size: 8 // sparkSize
                });
            }
        }

        function animarSparks() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = sparks.length - 1; i >= 0; i--) {
                let p = sparks[i];
                p.x += p.vx; p.y += p.vy;
                p.alpha -= 0.025; // Duración aproximada de 400ms
                if (p.alpha <= 0) { sparks.splice(i, 1); continue; }
                ctx.fillStyle = `rgba(255, 255, 255, ${p.alpha})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.alpha, 0, Math.PI * 2);
                ctx.fill();
            }
            requestAnimationFrame(animarSparks);
        }
        animarSparks();

        // --- CONTROL DE LOGIN Y PERFIL ---
        window.onload = function() {
            const select = document.getElementById('select-favorito');
            Object.keys(banderasPaises).forEach(p => {
                let opt = document.createElement('option'); opt.value = p; opt.innerText = p; select.appendChild(opt);
            });
            actualizarTablaGeneral();
        };

        function intentarLogin() {
            const user = document.getElementById('login-usuario').value;
            const pass = document.getElementById('login-clave').value.trim();
            if (credenciales[user] && credenciales[user] === pass) {
                usuarioLogueado = user;
                document.getElementById('seccion-login').style.display = 'none';
                document.getElementById('seccion-dashboard').style.display = 'block';
                document.getElementById('mi-nombre').innerText = user;
                dibujarAmigosCancha();
                ejecutarNoticieroMascota();
                setInterval(ejecutarNoticieroMascota, 45000); // Lanzar cada 45 segundos
            }
        }

        function actualizarEquipoFavorito(pais) {
            if(!pais) return;
            const flag = document.getElementById('flag-fav');
            flag.src = `https://flagcdn.com/${banderasPaises[pais]}.svg`; flag.style.display = "block";

            // Inyectar 3 datos completamente aleatorios y diferentes de la lista de 10
            const box = document.getElementById('curiosidades-box'); box.innerHTML = "";
            let pool = [...(poolCuriosidades[pais] || ["¡Dato exclusivo en desarrollo para este equipo nacional!"])];
            
            for(let i=0; i<3; i++) {
                if(pool.length === 0) break;
                let index = Math.floor(Math.random() * pool.length);
                let item = document.createElement('div'); item.classList.add('dato-item');
                item.innerText = `▪️ ${pool[index]}`;
                box.appendChild(item);
                pool.splice(index, 1);
            }
        }

        // --- SISTEMA COMENTARISTA DINÁMICO (NOTICIAS EN VIVO) ---
        function ejecutarNoticieroMascota() {
            const m = mascotas[Math.floor(Math.random() * mascotas.length)];
            document.getElementById('mascota-img').src = m.img;

            const titulares = [
                "🔥 ¡Atención! Saúl lidera la quiniela con mano de hierro en este momento.",
                "⚠️ Alerta de empate en la zona media entre Jorge y Osmel con los mismos aciertos parciales.",
                "⚽ ¡Increíble! Nadie ha fallado el primer clasificado del Grupo A hasta la fecha.",
                "📉 Última hora: Gerardo se encuentra en el fondo de la tabla intentando remontar."
            ];
            document.getElementById('comentario-texto').innerText = titulares[Math.floor(Math.random() * titulares.length)];
        }

        function dibujarAmigosCancha() {
            const contenedor = document.getElementById('cancha-amigos'); contenedor.innerHTML = "";
            Object.keys(credenciales).forEach(nombre => {
                if(nombre === usuarioLogueado) return;
                let div = document.createElement('div'); div.classList.add('amigo-burbuja');
                div.innerHTML = `<img class="amigo-pic" src="https://cdn-icons-png.flaticon.com/512/53/53283.png"><span class="amigo-txt">${nombre}</span>`;
                contenedor.appendChild(div);
            });
        }

        function actualizarTablaGeneral() {
            const cuerpo = document.getElementById('cuerpo-tabla'); cuerpo.innerHTML = "";
            Object.keys(credenciales).forEach((nombre, i) => {
                let r = cuerpo.insertRow();
                r.innerHTML = `<td>${i+1}</td><td><b>${nombre}</b></td><td>3</td><td>2</td><td><b>5 pts</b></td>`;
            });
        }

        function cerrarSesion() { location.reload(); }
    </script>
</body>
</html>
