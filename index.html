<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela Mundialista - Red Social</title>
    <style>
        /* --- VARIABLES Y CONFIGURACIÓN --- */
        :root {
            --verde-grama: #1b4d22;
            --verde-oscuro: #0f3015;
            --dorado: #ffd700;
            --blanco: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background-color: #122613;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* --- PANTALLA DE LOGIN --- */
        .pantalla-login {
            background: rgba(255, 255, 255, 0.96);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 4px solid var(--dorado);
        }

        .campo-login {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }

        button {
            background: var(--verde-grama);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        button:hover {
            background: #256e30;
            transform: translateY(-2px);
        }

        .error-msg { color: red; font-weight: bold; margin-top: 10px; display: none; }

        /* --- ESTRUCTURA PRINCIPAL (DASHBOARD) --- */
        .dashboard-container {
            display: none; /* Controlado por JS */
            width: 100vw;
            height: 100vh;
            grid-template-columns: 300px 1fr;
        }

        /* --- COLUMNA LATERAL (PERFIL TIPO LINKEDIN) --- */
        .sidebar-perfil {
            background: var(--blanco);
            border-right: 3px solid var(--dorado);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            box-shadow: 5px 0 15px rgba(0,0,0,0.3);
            z-index: 20;
            justify-content: space-between;
        }

        .info-superior-perfil {
            width: 100%;
            text-align: center;
        }

        .avatar-contenedor {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 15px;
            border-radius: 50%;
            border: 4px solid var(--verde-grama);
            background: #f0f0f0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .btn-subir-foto {
            background: rgba(0,0,0,0.6);
            color: white;
            position: absolute;
            bottom: 0;
            width: 100%;
            font-size: 11px;
            padding: 4px 0;
            cursor: pointer;
            text-align: center;
        }

        .nombre-perfil {
            font-size: 24px;
            color: var(--verde-oscuro);
            font-weight: bold;
            margin-bottom: 5px;
        }

        .equipo-favorito {
            font-size: 14px;
            color: #555;
            margin-bottom: 20px;
            background: #e8f5e9;
            padding: 5px 10px;
            border-radius: 15px;
            display: inline-block;
        }

        .menu-perfil-botones button {
            width: 100%;
            margin-bottom: 10px;
        }

        .btn-salir {
            background: #cc2424;
            width: 100%;
        }
        .btn-salir:hover { background: #e53935; }

        /* --- CONTENIDO CENTRAL (CANCHA DE FÚTBOL) --- */
        .area-central {
            display: grid;
            grid-template-rows: 1fr auto;
            position: relative;
            height: 100vh;
        }

        .cancha-futbol {
            position: relative;
            background-color: #1b4d22;
            /* Grama Real Texturizada */
            background-image: 
                linear-gradient(rgba(255,255,255,0.1) 2px, transparent 2px),
                linear-gradient(90deg, rgba(255,255,255,0.1) 2px, transparent 2px),
                repeating-linear-gradient(0deg, #18441e, #18441e 40px, #1c4f23 40px, #1c4f23 80px);
            background-size: 40px 40px, 40px 40px, auto;
            border: 5px solid rgba(255,255,255,0.3);
            margin: 15px;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 30px;
            padding: 40px;
            transition: transform 0.2s ease-out;
        }

        /* Líneas de la cancha simuladas */
        .cancha-futbol::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            background: rgba(255,255,255,0.2);
            top: 50%;
            left: 0;
        }

        .cancha-futbol::after {
            content: '';
            position: absolute;
            width: 120px;
            height: 120px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            top: calc(50% - 60px);
            left: calc(50% - 60px);
        }

        /* Amigos en la Cancha */
        .amigo-cancha {
            background: rgba(255,255,255,0.9);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            width: 110px;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            z-index: 5;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .amigo-cancha:hover {
            transform: scale(1.1) translateY(-5px);
            border-color: var(--dorado);
            background: #fff;
        }

        .amigo-avatar {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: #ddd;
            margin: 0 auto 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 2px solid var(--verde-grama);
        }

        .amigo-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .amigo-nombre {
            font-size: 13px;
            font-weight: bold;
            color: #333;
        }

        .amigo-puntos {
            font-size: 11px;
            color: #666;
            background: #e0f2f1;
            padding: 2px 5px;
            border-radius: 8px;
            margin-top: 3px;
            display: inline-block;
        }

        /* --- FORMULARIO Y SECCIÓN DE RESPUESTAS MODAL --- */
        .modal-quiniela {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-contenido {
            background: white;
            width: 90%;
            max-width: 850px;
            height: 85%;
            border-radius: 15px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            border: 4px solid var(--dorado);
        }

        .grid-grupos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 15px;
            overflow-y: auto;
            flex-grow: 1;
            padding: 10px;
            background: #f7f7f7;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .tarjeta-grupo {
            background: white;
            border: 2px solid var(--verde-grama);
            border-radius: 8px;
            padding: 12px;
        }

        .tarjeta-grupo h4 {
            background: var(--verde-grama);
            color: white;
            text-align: center;
            padding: 4px;
            border-radius: 4px;
            margin-bottom: 8px;
        }

        .fila-bandera {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 5px 0;
            font-size: 14px;
        }

        .bandera-img {
            width: 24px;
            height: 16px;
            object-fit: cover;
            border: 1px solid #ccc;
            border-radius: 2px;
        }

        .selector-clasificado {
            width: 100%;
            padding: 6px;
            margin-top: 4px;
            border-radius: 4px;
            font-size: 13px;
        }

        .voto-vista {
            font-size: 13px;
            padding: 4px;
            background: #e8f5e9;
            margin-top: 4px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
    </style>
</head>
<body>

    <div class="pantalla-login" id="seccion-login">
        <h1 style="color: var(--verde-grama); margin-bottom: 15px;">🏆 Estadio Quiniela 🏆</h1>
        <p style="color: #666; margin-bottom: 20px;">Inicia sesión en tu perfil</p>
        
        <select id="login-usuario" class="campo-login">
            <option value="">Selecciona tu usuario...</option>
            <option value="Saul">Saul</option>
            <option value="Jorge">Jorge</option>
            <option value="Osmel">Osmel</option>
            <option value="Edgar">Edgar</option>
            <option value="Guillermo">Guillermo</option>
            <option value="Francisco">Francisco</option>
            <option value="Gerardo">Gerardo</option>
        </select>
        <input type="password" id="login-clave" class="campo-login" placeholder="Contraseña (Tu País del Mundial)">
        <button onclick="intentarLogin()" style="width: 100%;">Ingresar al Dashboard</button>
        <p class="error-msg" id="error-login">Usuario o Contraseña incorrectos.</p>
    </div>

    <div class="dashboard-container" id="seccion-dashboard">
        
        <aside class="sidebar-perfil">
            <div class="info-superior-perfil">
                <div class="avatar-contenedor">
                    <img id="mi-avatar" class="avatar-img" src="https://cdn-icons-png.flaticon.com/512/53/53283.png" alt="Avatar">
                    <label class="btn-subir-foto">
                        Subir Foto
                        <input type="file" id="input-foto" accept="image/*" style="display:none;" onchange="procesarFoto(event)">
                    </label>
                </div>
                <div class="nombre-perfil" id="mi-nombre">Usuario</div>
                <div class="equipo-favorito" id="mi-equipo">País: Cargando...</div>

                <div class="menu-perfil-botones" id="bloque-botones-edicion">
                    <button onclick="abrirModalQuiniela(true)">📝 Editar Mi Quiniela</button>
                </div>
            </div>

            <button onclick="cerrarSesion()" class="btn-salir">🚪 Cerrar Aplicación</button>
        </aside>

        <main class="area-central">
            <div class="cancha-futbol" id="cancha">
                </div>
        </main>
    </div>

    <div class="modal-quiniela" id="modal-q">
        <div class="modal-contenido">
            <h2 id="modal-titulo" style="color: var(--verde-grama); margin-bottom: 15px;">Pronósticos</h2>
            <div class="grid-grupos" id="modal-grid-grupos"></div>
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button id="btn-modal-guardar" onclick="guardarMiQuiniela()">Guardar Cambios</button>
                <button onclick="cerrarModal()" style="background: #666;">Cerrar</button>
            </div>
        </div>
    </div>

    <script>
        // Mapeo oficial de códigos de bandera ISO (Para cargar banderas SVG reales gratis de Flagcdn)
        const banderasPaises = {
            "Argentina": "ar", "Francia": "fr", "Marruecos": "ma", "Canadá": "ca",
            "España": "es", "Alemania": "de", "Japón": "jp", "Ecuador": "ec",
            "Brasil": "br", "Portugal": "pt", "Corea del Sur": "kr", "Jamaica": "jm",
            "Italia": "it", "Bélgica": "be", "Argelia": "dz", "Honduras": "hn",
            "Uruguay": "uy", "Inglaterra": "gb-eng", "Australia": "au", "Irak": "iq",
            "Países Bajos": "nl", "Croacia": "hr", "Nigeria": "ng", "Panamá": "pa",
            "Colombia": "co", "Suiza": "ch", "Irán": "ir", "Sudáfrica": "za",
            "Estados Unidos": "us", "Gales": "gb-wls", "Arabia Saudita": "sa", "Perú": "pe",
            "México": "mx", "Dinamarca": "dk", "Túnez": "tn", "Nueva Zelanda": "nz",
            "Chile": "cl", "Austria": "at", "Egipto": "eg", "China": "cn",
            "Senegal": "sn", "Serbia": "rs", "Camerún": "cm", "Costa Rica": "cr",
            "Suecia": "se", "Polonia": "pl", "Ghana": "gh"
        };

        const gruposMundial = {
            "A": ["Argentina", "Francia", "Marruecos", "Canadá"],
            "B": ["España", "Alemania", "Japón", "Ecuador"],
            "C": ["Brasil", "Portugal", "Corea del Sur", "Jamaica"],
            "D": ["Italia", "Bélgica", "Argelia", "Honduras"],
            "E": ["Uruguay", "Inglaterra", "Australia", "Irak"],
            "F": ["Países Bajos", "Croacia", "Nigeria", "Panamá"],
            "G": ["Colombia", "Suiza", "Irán", "Sudáfrica"],
            "H": ["Estados Unidos", "Gales", "Arabia Saudita", "Perú"],
            "I": ["México", "Dinamarca", "Túnez", "Nueva Zelanda"],
            "J": ["Chile", "Austria", "Egipto", "China"],
            "K": ["Senegal", "Serbia", "Camerún", "Costa Rica"],
            "L": ["Suecia", "Polonia", "Ghana", "Argentina"]
        };

        const credenciales = {
            "Saul": "Argentina", "Jorge": "España", "Osmel": "Brasil",
            "Edgar": "Francia", "Guillermo": "Alemania", "Francisco": "Portugal", "Gerardo": "Italia"
        };

        let usuarioLogueado = "";

        // Textura dinámica del movimiento del mouse en el césped
        document.addEventListener('mousemove', (e) => {
            const cancha = document.getElementById('cancha');
            if(cancha) {
                const moverX = (e.clientX / window.innerWidth - 0.5) * 20;
                const moverY = (e.clientY / window.innerHeight - 0.5) * 20;
                cancha.style.transform = `translate(${moverX}px, ${moverY}px)`;
            }
        });

        function intentarLogin() {
            const usuario = document.getElementById('login-usuario').value;
            const clave = document.getElementById('login-clave').value.trim();
            const errorMsg = document.getElementById('error-login');

            if (credenciales[usuario] && credenciales[usuario].toLowerCase() === clave.toLowerCase()) {
                usuarioLogueado = usuario;
                errorMsg.style.display = 'none';
                document.getElementById('login-clave').value = "";
                
                document.getElementById('seccion-login').style.display = 'none';
                document.getElementById('seccion-dashboard').style.display = 'grid';
                
                cargarDatosPerfil();
                dibujarEstadioAmigos();
            } else {
                errorMsg.style.display = 'block';
            }
        }

        function cargarDatosPerfil() {
            document.getElementById('mi-nombre').innerText = usuarioLogueado;
            document.getElementById('mi-equipo').innerText = `País: ${credenciales[usuarioLogueado]}`;
            
            // Cargar foto si ya se guardó antes en localStorage
            const fotoGuardada = localStorage.getItem(`foto_${usuarioLogueado}`);
            if (fotoGuardada) {
                document.getElementById('mi-avatar').src = fotoGuardada;
            } else {
                document.getElementById('mi-avatar').src = "https://cdn-icons-png.flaticon.com/512/53/53283.png";
            }
        }

        function procesarFoto(event) {
            const lector = new FileReader();
            lector.onload = function() {
                const base64 = lector.result;
                localStorage.setItem(`foto_${usuarioLogueado}`, base64);
                document.getElementById('mi-avatar').src = base64;
                dibujarEstadioAmigos(); // Redibuja la cancha para actualizar tu foto
            }
            lector.readAsDataURL(event.target.files[0]);
        }

        function dibujarEstadioAmigos() {
            const cancha = document.getElementById('cancha');
            cancha.innerHTML = "";

            Object.keys(credenciales).forEach(nombre => {
                if (nombre === usuarioLogueado) return; // Mostrar solo a los demás en el campo

                const divAmigo = document.createElement('div');
                divAmigo.classList.add('amigo-cancha');
                divAmigo.onclick = () => abrirModalQuiniela(false, nombre);

                const fotoAmigo = localStorage.getItem(`foto_${nombre}`) || "https://cdn-icons-png.flaticon.com/512/53/53283.png";
                
                divAmigo.innerHTML = `
                    <div class="amigo-avatar">
                        <img src="${fotoAmigo}" alt="${nombre}">
                    </div>
                    <div class="amigo-nombre">${nombre}</div>
                    <div class="amigo-puntos">Ver Quiniela</div>
                `;
                cancha.appendChild(divAmigo);
            });
        }

        function abrirModalQuiniela(esEditable, nombreAmigo = "") {
            const modal = document.getElementById('modal-q');
            const titulo = document.getElementById('modal-titulo');
            const grid = document.getElementById('modal-grid-grupos');
            const btnGuardar = document.getElementById('btn-modal-guardar');
            
            grid.innerHTML = "";
            modal.style.display = "flex";

            if (esEditable) {
                titulo.innerText = "Configurar mis Pronósticos (A-L)";
                btnGuardar.style.display = "block";
                
                const datosPropios = JSON.parse(localStorage.getItem(`quiniela_${usuarioLogueado}`)) || {};

                Object.keys(gruposMundial).forEach(letra => {
                    const equipos = gruposMundial[letra];
                    const tarjeta = document.createElement('div');
                    tarjeta.classList.add('tarjeta-grupo');

                    let opciones = `<option value="">-- Seleccionar --</option>`;
                    equipos.forEach(eq => {
                        opciones += `<option value="${eq}">${eq}</option>`;
                    });

                    tarjeta.innerHTML = `
                        <h4>Grupo ${letra}</h4>
                        ${equipos.map(eq => `
                            <div class="fila-bandera">
                                <img class="bandera-img" src="https://flagcdn.com/${banderasPaises[eq]}.svg">
                                <span>${eq}</span>
                            </div>
                        `).join('')}
                        <label style="font-size:11px; font-weight:bold; margin-top:5px; display:block;">1º Clasificado:</label>
                        <select class="selector-clasificado" id="mod-grupo-${letra}-1ro">${opciones}</select>
                        <label style="font-size:11px; font-weight:bold; margin-top:5px; display:block;">2º Clasificado:</label>
                        <select class="selector-clasificado" id="mod-grupo-${letra}-2do">${opciones}</select>
                    `;
                    grid.appendChild(tarjeta);

                    // Pre-cargar valores ya guardados
                    if (datosPropios[letra]) {
                        document.getElementById(`mod-grupo-${letra}-1ro`).value = datosPropios[letra]["1ro"];
                        document.getElementById(`mod-grupo-${letra}-2do`).value = datosPropios[letra]["2do"];
                    }
                });
            } else {
                titulo.innerText = `Quiniela de ${nombreAmigo}`;
                btnGuardar.style.display = "none";

                const datosAmigo = JSON.parse(localStorage.getItem(`quiniela_${nombreAmigo}`)) || null;

                Object.keys(gruposMundial).forEach(letra => {
                    const tarjeta = document.createElement('div');
                    tarjeta.classList.add('tarjeta-grupo');

                    let v1 = "No elegido";
                    let v2 = "No elegido";
                    let flag1 = "", flag2 = "";

                    if (datosAmigo && datosAmigo[letra]) {
                        v1 = datosAmigo[letra]["1ro"] || "No elegido";
                        v2 = datosAmigo[letra]["2do"] || "No elegido";
                        if(banderasPaises[v1]) flag1 = `<img class="bandera-img" src="https://flagcdn.com/${banderasPaises[v1]}.svg">`;
                        if(banderasPaises[v2]) flag2 = `<img class="bandera-img" src="https://flagcdn.com/${banderasPaises[v2]}.svg">`;
                    }

                    tarjeta.innerHTML = `
                        <h4>Grupo ${letra}</h4>
                        <div class="voto-vista">🥇 1ro: ${flag1} <b>${v1}</b></div>
                        <div class="voto-vista">🥈 2do: ${flag2} <b>${v2}</b></div>
                    `;
                    grid.appendChild(tarjeta);
                });
            }
        }

        function guardarMiQuiniela() {
            let misPredicciones = {};
            Object.keys(gruposMundial).forEach(letra => {
                const prim = document.getElementById(`mod-grupo-${letra}-1ro`).value;
                const seg = document.getElementById(`mod-grupo-${letra}-2do`).value;
                misPredicciones[letra] = { "1ro": prim, "2do": seg };
            });

            localStorage.setItem(`quiniela_${usuarioLogueado}`, JSON.stringify(misPredicciones));
            alert("¡Tus predicciones han sido guardadas con éxito!");
            cerrarModal();
        }

        function cerrarModal() {
            document.getElementById('modal-q').style.display = "none";
        }

        function cerrarSesion() {
            usuarioLogueado = "";
            document.getElementById('seccion-dashboard').style.display = 'none';
            document.getElementById('seccion-login').style.display = 'block';
        }
    </script>
</body>
</html>
