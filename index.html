<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela Mundialista - Los 7 Amigos</title>
    <style>
        /* --- ESTILOS GENERALES Y FONDO DE GRAMA INTERACTIVO --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1e4620;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(255,255,255,0.1) 1px, transparent 1px),
                linear-gradient(60deg, #1b4d22 25%, #225e2a 25%, #225e2a 50%, #1b4d22 50%, #1b4d22 75%, #225e2a 75%, #225e2a);
            background-size: 40px 40px;
            overflow-x: hidden;
            position: relative;
            padding: 20px 0;
        }

        .grama-interactiva {
            position: fixed;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background: repeating-linear-gradient(90deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 2px, transparent 2px, transparent 40px);
            z-index: 1;
            pointer-events: none;
            transition: transform 0.2s ease-out;
        }

        /* --- CONTENEDORES PRINCIPALES --- */
        .contenedor {
            background: rgba(255, 255, 255, 0.96);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 92%;
            max-width: 500px;
            z-index: 10;
            text-align: center;
            border: 4px solid #ffd700;
            display: none;
        }

        .contenedor.ancho {
            max-width: 900px;
        }

        .activo {
            display: block;
        }

        h1 {
            color: #1b4d22;
            margin-bottom: 20px;
            font-size: 28px;
            text-transform: uppercase;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        h2 {
            color: #333;
            margin-bottom: 15px;
        }

        /* --- LOGIN --- */
        .campo-login {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }

        button {
            background: #1b4d22;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: background 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            background: #225e2a;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .error-msg {
            color: red;
            font-weight: bold;
            margin-top: 10px;
            display: none;
        }

        /* --- TABLA DE POSICIONES --- */
        .tabla-puntos {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }

        .tabla-puntos th, .tabla-puntos td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        .tabla-puntos th {
            background-color: #1b4d22;
            color: white;
        }

        .podio { font-weight: bold; color: #ffd700; }
        
        .usuario-actual-info {
            background: #e8f5e9;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #1b4d22;
            font-weight: bold;
            font-size: 16px;
        }

        .botones-menu {
            display: flex;
            gap: 10px;
        }

        .btn-secundario { background: #555; }
        .btn-secundario:hover { background: #666; }

        /* --- MALLA DE GRUPOS DE LA QUINIELA --- */
        .contenedor-grupos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
            max-height: 60vh;
            overflow-y: auto;
            padding: 10px;
            border: 1px dashed #ccc;
            border-radius: 10px;
            background: #fafafa;
        }

        .tarjeta-grupo {
            background: #fff;
            border: 2px solid #1b4d22;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: left;
        }

        .tarjeta-grupo h3 {
            background: #1b4d22;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            margin-bottom: 10px;
            text-align: center;
        }

        .lista-equipos {
            list-style: none;
            margin-bottom: 12px;
            font-size: 14px;
            color: #555;
        }

        .lista-equipos li {
            padding: 3px 0;
            border-bottom: 1px dotted #eee;
        }

        .selector-clasificado {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #aaa;
            font-size: 13px;
        }

        .label-q {
            font-size: 12px;
            font-weight: bold;
            color: #1b4d22;
            display: block;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <div class="grama-interactiva" id="grama"></div>

    <div class="contenedor activo" id="pantalla-login">
        <h1>🏆 Quiniela Amigos 🏆</h1>
        <p style="margin-bottom: 20px; color: #666;">Introduce tu usuario y tu país para ingresar</p>
        
        <select id="login-usuario" class="campo-login">
            <option value="">Selecciona tu usuario...</option>
            <option value="Saul">Saul</option>
            <option value="Jorge">Jorge</option>
            <option value="Osmel">Osmel</option>
            <option value="Edgar">Edgar</option>
            <option value="Guillermo">Guillermo</option>
            <option value="Francisco">Francisco</option>
            <option value="Gerardo">Gerardo</option>
        </select>

        <input type="password" id="login-clave" class="campo-login" placeholder="Contraseña (Tu País asignado)">
        
        <button onclick="intentarLogin()">Ingresar a la Quiniela</button>
        <p class="error-msg" id="error-login">Usuario o clave (país) incorrectos.</p>
    </div>

    <div class="contenedor" id="pantalla-dashboard">
        <h1>Quiniela del Mundial</h1>
        
        <div class="usuario-actual-info" id="info-sesion"></div>

        <h2>📊 Tabla General de Posiciones</h2>
        
        <table class="tabla-puntos">
            <thead>
                <tr>
                    <th>Pos</th>
                    <th>Amigo</th>
                    <th>Puntos</th>
                </tr>
            </thead>
            <tbody id="cuerpo-tabla"></tbody>
        </table>

        <div class="botones-menu">
            <button onclick="irAFormulario()">📝 Mi Quiniela</button>
            <button onclick="cerrarSesion()" class="btn-secundario">Salir</button>
        </div>
    </div>

    <div class="contenedor ancho" id="pantalla-quiniela">
        <h1>Configurar Mis Pronósticos</h1>
        <div class="usuario-actual-info" id="info-sesion-q"></div>
        
        <p style="margin-bottom: 15px; color: #555;">Selecciona tus dos clasificados por cada grupo del mundial (A-L):</p>
        
        <div class="contenedor-grupos" id="bloque-grupos"></div>
        
        <div class="botones-menu">
            <button onclick="guardarQuiniela()">💾 Guardar Predicciones</button>
            <button onclick="irADashboard()" class="btn-secundario">Volver</button>
        </div>
    </div>

    <script>
        // Estructura de Grupos Oficiales (48 equipos ficticios/reales distribuidos de A a L)
        const gruposMundial = {
            "A": ["Argentina", "Francia", "Marruecos", "Canadá"],
            "B": ["España", "Alemania", "Japón", "Ecuador"],
            "C": ["Brasil", "Portugal", "Corea del Sur", "Jamaica"],
            "D": ["Italia", "Bélgica", "Argelia", "Honduras"],
            "E": ["Uruguay", "Inglaterra", "Australia", "Irak"],
            "F": ["Países Bajos", "Croacia", "Nigeria", "Panamá"],
            "G": ["Colombia", "Suiza", "Irán", "Sudáfrica"],
            "H": ["Estados Unidos", "Gales", "Arabia Saudita", "Perú"],
            "I": ["México", "Dinamarca", "Túnez", "Nueva Zelanda"],
            "J": ["Chile", "Austria", "Egipto", "China"],
            "K": ["Senegal", "Serbia", "Camerún", "Costa Rica"],
            "L": ["Suecia", "Polonia", "Ghana", "Canadá"]
        };

        // Resultados Oficiales Simulados (Para el cálculo de puntos Arcade)
        const resultadosReales = {
            "A": { "1ro": "Argentina", "2do": "Francia" },
            "B": { "1ro": "España", "2do": "Alemania" },
            "C": { "1ro": "Brasil", "2do": "Portugal" },
            "D": { "1ro": "Italia", "2do": "Bélgica" },
            "E": { "1ro": "Uruguay", "2do": "Inglaterra" },
            "F": { "1ro": "Países Bajos", "2do": "Croacia" },
            "G": { "1ro": "Colombia", "2do": "Suiza" },
            "H": { "1ro": "Estados Unidos", "2do": "Gales" },
            "I": { "1ro": "México", "2do": "Dinamarca" },
            "J": { "1ro": "Chile", "2do": "Austria" },
            "K": { "1ro": "Senegal", "2do": "Serbia" },
            "L": { "1ro": "Suecia", "2do": "Polonia" }
        };

        const credenciales = {
            "Saul": "Argentina", "Jorge": "España", "Osmel": "Brasil",
            "Edgar": "Francia", "Guillermo": "Alemania", "Francisco": "Portugal", "Gerardo": "Italia"
        };

        let usuarioLogueado = "";

        // Inicializar el diseño de los grupos A-L al cargar
        function inicializarGruposFormulario() {
            const contenedor = document.getElementById('bloque-grupos');
            contenedor.innerHTML = "";

            Object.keys(gruposMundial).forEach(letra => {
                const equipos = gruposMundial[letra];
                
                const tarjeta = document.createElement('div');
                tarjeta.classList.add('tarjeta-grupo');
                
                let opcionesEquipos = `<option value="">-- Selecciona --</option>`;
                equipos.forEach(eq => {
                    opcionesEquipos += `<option value="${eq}">${eq}</option>`;
                });

                tarjeta.innerHTML = `
                    <h3>Grupo ${letra}</h3>
                    <ul class="lista-equipos">
                        <li>⚽ ${equipos[0]}</li>
                        <li>⚽ ${equipos[1]}</li>
                        <li>⚽ ${equipos[2]}</li>
                        <li>⚽ ${equipos[3]}</li>
                    </ul>
                    <span class="label-q">🥇 1° Clasificado:</span>
                    <select class="selector-clasificado" id="grupo-${letra}-1ro">
                        ${opcionesEquipos}
                    </select>
                    <span class="label-q">🥈 2° Clasificado:</span>
                    <select class="selector-clasificado" id="grupo-${letra}-2do">
                        ${opcionesEquipos}
                    </select>
                `;
                contenedor.appendChild(tarjeta);
            });
        }

        // Mouse Move Effect
        document.addEventListener('mousemove', (e) => {
            const grama = document.getElementById('grama');
            const moverX = (e.clientX / window.innerWidth - 0.5) * 30;
            const moverY = (e.clientY / window.innerHeight - 0.5) * 30;
            grama.style.transform = `translate(${moverX}px, ${moverY}px)`;
        });

        function intentarLogin() {
            const usuario = document.getElementById('login-usuario').value;
            const clave = document.getElementById('login-clave').value.trim();
            const errorMsg = document.getElementById('error-login');

            if (credenciales[usuario] && credenciales[usuario].toLowerCase() === clave.toLowerCase()) {
                usuarioLogueado = usuario;
                errorMsg.style.display = 'none';
                document.getElementById('login-clave').value = "";
                irADashboard();
            } else {
                errorMsg.style.display = 'block';
            }
        }

        function cerrarSesion() {
            usuarioLogueado = "";
            cambiarPantalla('pantalla-login');
        }

        function cambiarPantalla(idPantalla) {
            document.getElementById('pantalla-login').classList.remove('activo');
            document.getElementById('pantalla-dashboard').classList.remove('activo');
            document.getElementById('pantalla-quiniela').classList.remove('activo');
            document.getElementById(idPantalla).classList.add('activo');
        }

        function irADashboard() {
            document.getElementById('info-sesion').innerText = `👋 Jugador activo: ${usuarioLogueado}`;
            actualizarTablaPosiciones();
            cambiarPantalla('pantalla-dashboard');
        }

        function irAFormulario() {
            document.getElementById('info-sesion-q').innerText = `Predicciones de: ${usuarioLogueado}`;
            inicializarGruposFormulario();
            cargarQuinielaGuardada();
            cambiarPantalla('pantalla-quiniela');
        }

        // Lógica de guardado nativo en navegador
        function guardarQuiniela() {
            let userPredictions = {};
            
            Object.keys(gruposMundial).forEach(letra => {
                const prim = document.getElementById(`grupo-${letra}-1ro`).value;
                const seg = document.getElementById(`grupo-${letra}-2do`).value;
                userPredictions[letra] = { "1ro": prim, "2do": seg };
            });

            localStorage.setItem(`quiniela_${usuarioLogueado}`, JSON.stringify(userPredictions));
            alert("¡Predicciones guardadas con éxito en este dispositivo!");
            irADashboard();
        }

        function cargarQuinielaGuardada() {
            const datos = localStorage.getItem(`quiniela_${usuarioLogueado}`);
            if (datos) {
                const predicciones = JSON.parse(datos);
                Object.keys(predicciones).forEach(letra => {
                    if(document.getElementById(`grupo-${letra}-1ro`)) {
                        document.getElementById(`grupo-${letra}-1ro`).value = predicciones[letra]["1ro"];
                        document.getElementById(`grupo-${letra}-2do`).value = predicciones[letra]["2do"];
                    }
                });
            }
        }

        // Sistema de Puntos Arcade (+100 acierto, -20 error)
        function calcularPuntosUsuario(nombreUsuario) {
            const datos = localStorage.getItem(`quiniela_${nombreUsuario}`);
            let puntos = 0;

            if (!datos) return 0; // Si no ha rellenado nada, empieza en 0
            
            const predicciones = JSON.parse(datos);

            Object.keys(resultadosReales).forEach(letra => {
                const pred = predicciones[letra];
                const real = resultadosReales[letra];

                if (pred) {
                    // Verificar 1er puesto
                    if (pred["1ro"] === real["1ro"]) puntos += 100;
                    else if (pred["1ro"] !== "") puntos -= 20;

                    // Verificar 2do puesto
                    if (pred["2do"] === real["2do"]) puntos += 100;
                    else if (pred["2do"] !== "") puntos -= 20;
                }
            });
            return puntos;
        }

        function actualizarTablaPosiciones() {
            const cuerpo = document.getElementById('cuerpo-tabla');
            cuerpo.innerHTML = "";

            // Calcular dinámicamente los puntajes de los 7 amigos basados en sus respuestas guardadas
            const listaOrdenada = Object.keys(credenciales).map(nombre => {
                return { nombre: nombre, puntos: calcularPuntosUsuario(nombre) };
            }).sort((a, b) => b.puntos - a.puntos);

            listaOrdenada.forEach((amigo, indice) => {
                const fila = document.createElement('tr');
                
                if (amigo.nombre === usuarioLogueado) {
                    fila.style.backgroundColor = "#c8e6c9";
                    fila.style.fontWeight = "bold";
                }

                const celdaPos = document.createElement('td');
                celdaPos.innerText = indice + 1;
                if(indice === 0) celdaPos.classList.add('podio');

                const celdaNombre = document.createElement('td');
                celdaNombre.innerText = amigo.nombre;

                const celdaPuntos = document.createElement('td');
                celdaPuntos.innerText = `${amigo.puntos} pts`;

                fila.appendChild(celdaPos);
                fila.appendChild(celdaNombre);
                fila.appendChild(celdaPuntos);
                cuerpo.appendChild(fila);
            });
        }
    </script>
</body>
</html>
